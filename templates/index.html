<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy</title>
    <style>
        @import url('https://rsms.me/inter/inter.css');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0e27;
            color: #e4e6eb;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 0;
        }

        /* Left Panel */
        .input-panel {
            width: 420px;
            background: rgba(20, 25, 50, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 0;
        }

        .input-header {
            padding: 2rem 1.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .input-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .input-header p {
            font-size: 0.85rem;
            color: #8a91a8;
            line-height: 1.5;
        }

        .input-body {
            flex: 1;
            padding: 1.75rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        /* Scrollbar */
        .input-body::-webkit-scrollbar {
            width: 6px;
        }

        .input-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .input-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .input-body::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Form */
        .form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.625rem;
        }

        .form-group label {
            font-weight: 500;
            color: #d0d5e0;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            display: flex;
            gap: 0.625rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #e4e6eb;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input[type="text"]::placeholder {
            color: #6b7280;
        }

        input[type="text"]:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        input[type="text"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .submit-btn {
            padding: 0.875rem 1.25rem;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.625rem;
            min-height: 44px;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.2) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0, 212, 255, 0.3);
        }

        .submit-btn:hover:not(:disabled)::before {
            opacity: 1;
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Status Messages */
        .status-message {
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-top: 0.75rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-message.success {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .status-message.error {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .status-message.info {
            background: rgba(59, 130, 246, 0.15);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        /* Features */
        .features {
            margin-top: 1.75rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .features h3 {
            font-size: 0.875rem;
            font-weight: 600;
            color: #d0d5e0;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .feature-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.625rem;
        }

        .feature-list li {
            font-size: 0.8125rem;
            color: #9ca3af;
            padding: 0.375rem 0;
            display: flex;
            align-items: flex-start;
            gap: 0.625rem;
            line-height: 1.4;
        }

        .feature-list li::before {
            content: '→';
            color: #00d4ff;
            font-weight: bold;
            flex-shrink: 0;
            margin-top: 2px;
        }

        /* Preview Panel */
        .preview-panel {
            flex: 1;
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.95) 0%, rgba(20, 25, 50, 0.95) 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-left: 1px solid rgba(255, 255, 255, 0.08);
        }

        .preview-header {
            background: rgba(20, 25, 50, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1.25rem 1.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .preview-header h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #d0d5e0;
        }

        .preview-actions {
            display: flex;
            gap: 0.5rem;
        }

        .preview-btn {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.08);
            color: #d0d5e0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8125rem;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .preview-btn:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.3);
            color: #00d4ff;
        }

        .iframe-wrapper {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: rgba(10, 14, 39, 0.5);
        }

        .iframe-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4b5563;
            text-align: center;
            flex-direction: column;
        }

        .empty-icon {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 1rem;
            opacity: 0.6;
        }

        .empty-text {
            font-size: 0.95rem;
            color: #6b7280;
        }

        /* Current URL Display */
        .current-url {
            word-break: break-all;
            font-size: 0.75rem;
            color: #00d4ff;
            background: rgba(0, 212, 255, 0.08);
            padding: 0.75rem;
            border-radius: 6px;
            margin-top: 0.75rem;
            border: 1px solid rgba(0, 212, 255, 0.2);
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            line-height: 1.4;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .input-panel {
                width: 100%;
                max-height: 40vh;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            }

            .preview-panel {
                border-left: none;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Input Panel -->
        <div class="input-panel">
            <div class="input-header">
                <h2>Web Proxy</h2>
                <p>Access any website through this proxy</p>
            </div>

            <div class="input-body">
                <form class="form" id="proxyForm">
                    <div class="form-group">
                        <label for="urlInput">URL</label>
                        <div class="input-wrapper">
                            <input
                                type="text"
                                id="urlInput"
                                placeholder="example.com"
                                autocomplete="off"
                                autofocus
                            >
                            <button type="submit" class="submit-btn" id="submitBtn">
                                <span>Load</span>
                            </button>
                        </div>
                    </div>
                </form>

                <div id="statusMessage" class="status-message hidden"></div>
                <div id="currentUrl" class="current-url hidden"></div>

                <button id="openNewTabBtn" class="preview-btn" style="width: 100%; margin-top: 1rem; display: none; padding: 0.75rem; background: rgba(0, 212, 255, 0.15); border: 1px solid rgba(0, 212, 255, 0.3); color: #00d4ff;">
                    New Tab
                </button>

                <div class="features">
                    <h3>Features</h3>
                    <ul class="feature-list">
                        <li>All images proxied</li>
                        <li>Video & audio streaming</li>
                        <li>CSS & JavaScript proxied</li>
                        <li>Fonts & all resources</li>
                        <li>Auto link interception</li>
                        <li>Form submission</li>
                        <li>Complex routing</li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- Right Preview Panel -->
        <div class="preview-panel">
            <div class="preview-header">
                <h2>Preview</h2>
                <div class="preview-actions">
                    <button id="reloadBtn" class="preview-btn" style="display: none;">
                        Reload
                    </button>
                </div>
            </div>

            <div class="iframe-wrapper" id="iframeWrapper">
                <div class="empty-state">
                    <span class="empty-icon">→</span>
                    <p class="empty-text">Enter a URL to get started</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const proxyForm = document.getElementById('proxyForm');
        const urlInput = document.getElementById('urlInput');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');
        const currentUrlDiv = document.getElementById('currentUrl');
        const iframeWrapper = document.getElementById('iframeWrapper');
        const openNewTabBtn = document.getElementById('openNewTabBtn');
        const reloadBtn = document.getElementById('reloadBtn');

        let proxiedHtml = '';
        let currentUrl = '';

        // フォーム送信
        proxyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            await handleProxyUrl();
        });

        // URL入力時のEnter対応
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleProxyUrl();
            }
        });

        async function handleProxyUrl() {
            const url = urlInput.value.trim();

            if (!url) {
                showStatus('URLを入力してください', 'error');
                return;
            }

            // https://を付け忘れた場合の対応
            let targetUrl = url;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                targetUrl = 'https://' + url;
            }

            try {
                // URL検証
                new URL(targetUrl);
            } catch {
                showStatus('無効なURLです', 'error');
                return;
            }

            showStatus('読み込み中...', 'info');
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/proxy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: targetUrl }),
                    timeout: 30000,
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'プロキシ処理に失敗しました');
                }

                const data = await response.json();
                proxiedHtml = data.html;
                currentUrl = data.url;

                // iframeに内容を設定
                displayProxiedContent(proxiedHtml);

                // ステータス表示
                showStatus('✓ 読み込み完了', 'success');
                currentUrlDiv.textContent = `現在のURL: ${currentUrl}`;
                currentUrlDiv.classList.remove('hidden');

                // ボタン表示
                openNewTabBtn.style.display = 'block';
                reloadBtn.style.display = 'block';

            } catch (error) {
                const message = error instanceof Error ? error.message : 'Unknown error';
                showStatus(`エラー: ${message}`, 'error');
                console.error('Proxy error:', error);
            } finally {
                submitBtn.disabled = false;
            }
        }

        function displayProxiedContent(html) {
            // 既存のiframeを削除
            const existingIframe = iframeWrapper.querySelector('iframe');
            if (existingIframe) {
                existingIframe.remove();
            }

            // 新しいiframeを作成
            const iframe = document.createElement('iframe');
            iframe.sandbox.add('allow-same-origin', 'allow-scripts', 'allow-forms', 'allow-popups', 'allow-top-navigation');
            iframe.srcdoc = html;

            // iframeのリンククリックをプロキシ化
            iframe.onload = () => {
                try {
                    const iframeDoc = iframe.contentDocument;
                    if (iframeDoc) {
                        // リンククリック処理
                        const links = iframeDoc.querySelectorAll('a[href]');
                        links.forEach(link => {
                            link.addEventListener('click', (e) => {
                                const href = link.getAttribute('href');
                                if (href && (href.startsWith('http://') || href.startsWith('https://'))) {
                                    e.preventDefault();
                                    urlInput.value = href;
                                    handleProxyUrl();
                                }
                            });
                        });

                        // フォーム送信処理
                        const forms = iframeDoc.querySelectorAll('form');
                        forms.forEach(form => {
                            form.addEventListener('submit', (e) => {
                                const action = form.getAttribute('action');
                                if (action) {
                                    e.preventDefault();
                                    urlInput.value = action;
                                    handleProxyUrl();
                                }
                            });
                        });
                    }
                } catch (err) {
                    console.log('iframe manipulation error (expected due to sandbox):', err);
                }
            };

            iframeWrapper.innerHTML = '';
            iframeWrapper.appendChild(iframe);
        }

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = `status-message ${type}`;
            statusMessage.classList.remove('hidden');

            if (type !== 'error') {
                setTimeout(() => {
                    if (statusMessage.className.includes(type)) {
                        statusMessage.classList.add('hidden');
                    }
                }, 5000);
            }
        }

        // 新しいタブで開く
        openNewTabBtn.addEventListener('click', () => {
            if (proxiedHtml) {
                const blob = new Blob([proxiedHtml], { type: 'text/html; charset=utf-8' });
                const blobUrl = URL.createObjectURL(blob);
                window.open(blobUrl, '_blank');
            }
        });

        // 再読み込み
        reloadBtn.addEventListener('click', () => {
            if (currentUrl) {
                handleProxyUrl();
            }
        });
    </script>
</body>
</html>
